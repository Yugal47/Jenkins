services:
  backend:
    build:
      context: ./backend
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: shareapp_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
